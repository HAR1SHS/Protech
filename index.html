        .tab:hover {
            background-color: #e2e8f0;
            color: #0f172a;
            transform: translateY(-2px);
        }
        .tab.active {
            background-color: #0ea5e9;
            color: white;

        }

        }
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: none;
            transition: opacity 0.5s ease;
            opacity: 0;
        }
        iframe.active {
            display: block;
            opacity: 1;
        }

    <script>
        function switchTab(tabId, btn) {
            // Remove active classes from all buttons and frames
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('iframe').forEach(f => {
                f.classList.remove('active');
                f.style.display = 'none'; // Ensure display none for hidden frames
            });
            
            // Add active class to clicked button and target frame
            btn.classList.add('active');
            const targetFrame = document.getElementById('frame-' + tabId);
            targetFrame.style.display = 'block';
            
            // Slight delay for smooth opacity transition
            setTimeout(() => {
                targetFrame.classList.add('active');
            }, 10);
        }
    </script>

    <script>
        const connections = [

            { src: 'sql', tgt: 'landing', dir: 'right' }, 
            { src: 'postgres', tgt: 'silver-compute', dir: 'right' },
            { src: 'postgres', tgt: 'op-dash', dir: 'right' },
            { src: 'api', tgt: 'landing', dir: 'right' },
            
            // Landing to Silver Compute
            { src: 'landing', tgt: 'silver-compute', dir: 'right' },
            
            // Silver Compute to Silver Delta Tables
            { src: 'silver-compute', tgt: 'silver-summary', dir: 'right' },
            { src: 'silver-compute', tgt: 'silver-raw', dir: 'right' },
            { src: 'silver-compute', tgt: 'silver-error', dir: 'right' },
 
            // Silver Raw to Gold Compute
            { src: 'silver-raw', tgt: 'gold-compute', dir: 'right' },
 
            // Gold Compute to Gold Delta Tables
            { src: 'gold-compute', tgt: 'gold-summary', dir: 'right' },
            { src: 'gold-compute', tgt: 'gold-curated', dir: 'right' },
            { src: 'gold-compute', tgt: 'gold-error', dir: 'right' },

            { src: 'gold-curated', tgt: 'insights', dir: 'right' },

            { src: 'anomaly', tgt: 'alerts', dir: 'right' }
        ];

        const graphData = {
            "sql": { title: "SQL Database", desc: "ProTech operational database.", sends: "<span class='tag'>Raw Data</span> ➔ Landing Layer", receives: "-", color: "#6366f1" },
            "postgres": { title: "Postgres Database", desc: "Operational PostgreSQL DB storing admin and config parameters.", sends: "<span class='tag'>Admin Data</span> ➔ Silver Databricks, <span class='tag'>Config Data</span> ➔ Operation Dashboard", receives: "-", color: "#6366f1" },
            "api": { title: "API", desc: "External variables (e.g. weather).", sends: "<span class='tag'>JSON Data</span> ➔ Landing Layer", receives: "-", color: "#6366f1" },
            
            "landing": { title: "Landing Layer", desc: "ADLS storage area managed by Azure Data Factory.", sends: "<span class='tag'>Raw Data</span> ➔ Silver Databricks", receives: "<span class='tag'>Data</span> ⬅ SQL & API", color: "#b45309" },
            
            "silver-compute": { title: "Silver Compute (Spark)", desc: "Databricks cluster processing landing data.", sends: "<span class='tag'>Processed Data</span> ➔ Silver Delta Tables", receives: "<span class='tag'>Raw Data</span> ⬅ Landing & Postgres", color: "#ff3621" },
            "silver-summary": { title: "Silver: Ingestion Summary", desc: "Delta table logging ingestion metadata.", sends: "-", receives: "<span class='tag'>Logs</span> ⬅ Silver Compute", color: "#0ea5e9" },
            "silver-raw": { title: "Silver: Raw Layer", desc: "Cleaned operational data ready for aggregation.", sends: "<span class='tag'>Clean Data</span> ➔ Gold Compute, <span class='tag'>Raw Data</span> ➔ Operation Dashboard", receives: "<span class='tag'>Data</span> ⬅ Silver Compute", color: "#0ea5e9" },
            "silver-error": { title: "Silver: Error Data", desc: "Quarantine table for validation failures.", sends: "-", receives: "<span class='tag'>Bad Records</span> ⬅ Silver Compute", color: "#0ea5e9" },
            
            "gold-compute": { title: "Gold Compute (Spark)", desc: "Databricks cluster generating business-level features.", sends: "<span class='tag'>Aggregated Data</span> ➔ Gold Delta Tables", receives: "<span class='tag'>Clean Data</span> ⬅ Silver Raw", color: "#ff3621" },
            "gold-summary": { title: "Gold: Ingestion Summary", desc: "Delta table logging Gold pipeline runs.", sends: "-", receives: "<span class='tag'>Logs</span> ⬅ Gold Compute", color: "#0ea5e9" },
            "gold-curated": { title: "Gold: Curated Layer", desc: "Highly refined business datasets and ML features.", sends: "<span class='tag'>Feature Vectors</span> ➔ Consumption Layer", receives: "<span class='tag'>Aggregations</span> ⬅ Gold Compute", color: "#0ea5e9" },
            "gold-error": { title: "Gold: Error Data", desc: "Quarantine for business logic failures.", sends: "-", receives: "<span class='tag'>Bad Records</span> ⬅ Gold Compute", color: "#0ea5e9" },
            
            "op-dash": { title: "Operation Dashboard", desc: "React-based UI for real-time operations.", sends: "-", receives: "<span class='tag'>Raw Data</span> ⬅ Silver Layer, <span class='tag'>Admin Config</span> ⬅ PostgreSQL DB", color: "#10b981" },
            "anomaly": { title: "Anomaly Detection", desc: "React service monitoring operational anomalies.", sends: "<span class='tag'>Triggers</span> ➔ Alerts", receives: "-", color: "#10b981" },
            "alerts": { title: "Alerts", desc: "Push notifications for anomalies.", sends: "-", receives: "<span class='tag'>Triggers</span> ⬅ Anomaly Detection", color: "#f97316" },
            
            "analytical": { title: "Analytical Dashboard", desc: "Business intelligence reporting.", sends: "-", receives: "<span class='tag'>Curated Data</span> ⬅ Gold Layer", color: "#10b981" },
            
            "insights": { title: "Insights & Recommendations", desc: "AI generated operational insights.", sends: "-", receives: "<span class='tag'>Curated Data</span> ⬅ Gold Layer", color: "#10b981" },
            "ai-agent": { title: "AI Agent", desc: "Autonomous agent executing optimizations.", sends: "-", receives: "<span class='tag'>Operational Insights</span> ⬅ Insights", color: "#10b981" }
        };

        const svgCanvas = document.getElementById('svg-canvas');
        let renderedPaths = [];

        function drawOrthogonalLines() {
            svgCanvas.innerHTML = '';
            renderedPaths = [];
            
            connections.forEach(conn => {
                const srcEl = document.getElementById('node-' + conn.src);
                const tgtEl = document.getElementById('node-' + conn.tgt);
                
                if (srcEl && tgtEl) {
                    const srcRect = srcEl.getBoundingClientRect();
                    const tgtRect = tgtEl.getBoundingClientRect();
                    
                    const scrollX = window.scrollX;
                    const scrollY = window.scrollY;

                    let x1, y1, x2, y2, d;

                    if (conn.src === 'postgres') {
                        x1 = srcRect.right + scrollX;
                        y1 = srcRect.top + srcRect.height / 2 + scrollY;
                        const srcGroupRect = srcEl.closest('.group').getBoundingClientRect();
                        const gap1X = srcGroupRect.right + scrollX + 30; // 30px right of the group
                        
                        // Find the tallest group's bottom coordinate to route bottom-bus safely below all columns
                        const groups = document.querySelectorAll('.group');
                        let maxBottom = 0;
                        groups.forEach(g => {
                            const rect = g.getBoundingClientRect();
                            const bottom = rect.bottom + scrollY;
                            if (bottom > maxBottom) maxBottom = bottom;
                        });
                        const bottomY = maxBottom + 25; // 25px below all columns
                        
                        let midX;
                        if (conn.tgt === 'op-dash') {
                            // Route the vertical bend in the gap between Gold and Consumption columns
                            const goldGroupRect = document.getElementById('node-gold-curated').closest('.group').getBoundingClientRect();
                            midX = goldGroupRect.right + scrollX + 30;
                        } else {
                            // Route the vertical bend in the gap between Bronze and Silver columns
                            const bronzeGroupRect = document.getElementById('node-landing').closest('.group').getBoundingClientRect();
                            midX = bronzeGroupRect.right + scrollX + 30;
                        }
                        
                        x2 = tgtRect.left + scrollX - 8;
                        y2 = tgtRect.top + tgtRect.height / 2 + scrollY;
                        
                        d = \`M \${x1} \${y1} L \${gap1X} \${y1} L \${gap1X} \${bottomY} L \${midX} \${bottomY} L \${midX} \${y2} L \${x2} \${y2}\`;
                    } else if (conn.src === 'silver-raw' && conn.tgt === 'op-dash') {
                        x1 = srcRect.right + scrollX;
                        y1 = srcRect.top + srcRect.height / 2 + scrollY;
                        const srcGroupRect = srcEl.closest('.group').getBoundingClientRect();
                        const gap2X = srcGroupRect.right + scrollX + 30; // 30px right of the group
                        
                        // Find the tallest group's bottom coordinate to route bottom-bus safely below all columns
                        const groups = document.querySelectorAll('.group');
                        let maxBottom = 0;
                        groups.forEach(g => {
                            const rect = g.getBoundingClientRect();
                            const bottom = rect.bottom + scrollY;
                            if (bottom > maxBottom) maxBottom = bottom;
                        });
                        const bottomY = maxBottom + 25; // 25px below all columns
                        
                        const goldGroupRect = document.getElementById('node-gold-curated').closest('.group').getBoundingClientRect();
                        const midX = goldGroupRect.right + scrollX + 30; // Gap between Gold and Consumption
                        
                        x2 = tgtRect.left + scrollX - 8;
                        y2 = tgtRect.top + tgtRect.height / 2 + scrollY;
                        
                        d = \`M \${x1} \${y1} L \${gap2X} \${y1} L \${gap2X} \${bottomY} L \${midX} \${bottomY} L \${midX} \${y2} L \${x2} \${y2}\`;
                    } else if (conn.dir === 'right') {
                        x1 = srcRect.right + scrollX; y1 = srcRect.top + srcRect.height / 2 + scrollY;
                        x2 = tgtRect.left + scrollX - 8; y2 = tgtRect.top + tgtRect.height / 2 + scrollY;
                        
                        // Use a segmented line to cleanly jump over complex DOM groupings
                        const srcGroup = srcEl.closest('.group');
                        const tgtGroup = tgtEl.closest('.group');
                        let midX;
                        if (srcGroup && tgtGroup && srcGroup !== tgtGroup) {
                            const srcGroupRect = srcGroup.getBoundingClientRect();
                            const tgtGroupRect = tgtGroup.getBoundingClientRect();
                            midX = srcGroupRect.right + scrollX + (tgtGroupRect.left - srcGroupRect.right) / 2;
                        } else {
                            midX = x1 + (x2 - x1) * 0.5;
                        }
                        d = \`M \${x1} \${y1} L \${midX} \${y1} L \${midX} \${y2} L \${x2} \${y2}\`;
                    }

                    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    path.setAttribute('d', d);
                    path.setAttribute('class', 'flow-line');
                    path.setAttribute('data-src', conn.src);
                    path.setAttribute('data-tgt', conn.tgt);
                    svgCanvas.appendChild(path);

                    const arrow = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
                    arrow.setAttribute('points', \`\${x2},\${y2-5} \${x2+8},\${y2} \${x2},\${y2+5}\`);
                    arrow.setAttribute('class', 'arrowhead');
                    svgCanvas.appendChild(arrow);

                    renderedPaths.push({ path, arrow, src: conn.src, tgt: conn.tgt });
                }
            });
        }

        // Use ResizeObserver to robustly redraw lines when the element becomes visible or resized
        const container = document.querySelector('.flowchart-container');
        if (container) {
            const observer = new ResizeObserver(() => {
                drawOrthogonalLines();
            });
            observer.observe(container);
        }

        // Slight delay to allow fonts and CSS boxes to settle before drawing lines
        window.addEventListener('load', () => setTimeout(drawOrthogonalLines, 100));
        window.addEventListener('resize', drawOrthogonalLines);

        // Hover Interactions
        const nodes = document.querySelectorAll('.node');
        const detailPanel = document.getElementById('details-panel');
        const instructions = document.getElementById('instructions');
        
        const dTitle = document.getElementById('detail-title');
        const dSends = document.getElementById('detail-sends');
        const dReceives = document.getElementById('detail-receives');
        const dDesc = document.getElementById('detail-desc');

        nodes.forEach(node => {
            node.addEventListener('mouseenter', () => {
                const id = node.id.replace('node-', '');
                const data = graphData[id];
                
                nodes.forEach(n => { n.classList.remove('active-source', 'active-target'); n.style.opacity = '0.3'; });
                
                node.classList.add('active-source');
                node.style.opacity = '1';

                svgCanvas.classList.add('svg-canvas-dimmed');

                renderedPaths.forEach(rp => {
                    rp.path.classList.remove('active-line');
                    rp.arrow.classList.remove('active-arrow');
                    
                    if (rp.src === id) {
                        rp.path.classList.add('active-line');
                        rp.arrow.classList.add('active-arrow');
                        const tNode = document.getElementById('node-' + rp.tgt);
                        if (tNode) { tNode.classList.add('active-target'); tNode.style.opacity = '1'; }
                    } else if (rp.tgt === id) {
                        rp.path.classList.add('active-line');
                        rp.arrow.classList.add('active-arrow');
                        const sNode = document.getElementById('node-' + rp.src);
                        if (sNode) { sNode.classList.add('active-target'); sNode.style.opacity = '1'; }
                    }
                });

                if(data) {
                    instructions.style.opacity = '0';
                    detailPanel.classList.add('visible');
                    
                    detailPanel.style.borderLeftColor = data.color;
                    dTitle.style.color = data.color;

                    dTitle.textContent = data.title;
                    dSends.innerHTML = data.sends;
                    dReceives.innerHTML = data.receives;
                    dDesc.textContent = data.desc;
                }
            });
        });

        document.querySelector('.flowchart-container').addEventListener('mouseleave', () => {
            detailPanel.classList.remove('visible');
            instructions.style.opacity = '1';
            
            svgCanvas.classList.remove('svg-canvas-dimmed');
            nodes.forEach(n => { n.classList.remove('active-source', 'active-target'); n.style.opacity = '1'; });
            renderedPaths.forEach(rp => { 
                rp.path.classList.remove('active-line'); 
                rp.arrow.classList.remove('active-arrow');
            });
        });
    <\/script>
</body>
</html>
`;

<body>
<div class="wrap">

    <div class="hero">
        <h1>Gateway / PortApps &mdash; The Edge Ingestion Layer</h1>
        <p>Protech's Building Management System (BMS) telemetry platform. Field devices in McDonald's stores
        stream <code style="color:#fff;background:rgba(255,255,255,.2);border:none">$&hellip;*</code> ASCII frames over raw TCP. The PortApps tier receives, validates,
        decodes and persists them into SQL Server &mdash; the upstream source that ultimately feeds the Databricks Medallion pipeline.</p>
        <div class="chips">
            <span>Protocol: raw TCP + ASCII frames</span>
        </div>
    </div>

    <div class="section">
        <h2><span class="num">1</span>What PortApps Is</h2>
        <p class="lede">The deployment/runtime tier of the BMS platform. Six responsibilities, in order:</p>
        <div class="grid cols-3">
            <div class="card"><h3>1 &middot; Listen</h3><p>Bind a range of raw TCP ports for incoming device connections.</p></div>
            <div class="card"><h3>2 &middot; Receive &amp; Parse</h3><p>Read the <code>$&hellip;*</code> ASCII data frames off the socket.</p></div>
            <div class="card"><h3>3 &middot; Validate</h3><p>Verify each frame with the Protech protocol checksum.</p></div>
            <div class="card"><h3>4 &middot; Resolve</h3><p>Look up site / customer from a cached master table.</p></div>
            <div class="card"><h3>5 &middot; Persist</h3><p>Write readings to SQL Server &mdash; stored procs (legacy) or staging + bulk copy (new).</p></div>
            <div class="card"><h3>6 &middot; Act</h3><p>ACK the device, control HVAC switches, surface health &amp; anomalies on a live dashboard.</p></div>
        </div>
    </div>

    <div class="section">
        <h2><span class="num">2</span>Two Generations, Deployed Side-by-Side</h2>
        <p class="lede">The new <code>BmsSmart</code> gateways consolidate many single-port legacy apps into two multi-port Windows Services.</p>
        <table>
            <tr><th>Gen</th><th>Apps</th><th>Framework</th><th>Build Solution</th><th>Role</th></tr>
            <tr><td><span class="sev med">Legacy</span></td><td>DP-31002, DP-31009, LP-30009</td><td>.NET 6.0</td><td><code>G:\\PharmaCustomers\\Apps\\PortsAppsVer11</code></td><td>One process <strong>per port</strong></td></tr>
            <tr><td><span class="sev info">New</span></td><td>BmsSmart-DataGateway, BmsSmart-CtrlGateway</td><td>.NET 8.0</td><td><code>E:\\ProtechBMS25</code></td><td>One service for <strong>all ports</strong></td></tr>
            <tr><td><span class="sev low">Test</span></td><td>ClientProcess</td><td>.NET Fx 4.8</td><td>&mdash;</td><td>TCP packet simulator</td></tr>
        </table>
        <div class="callout"><strong>Naming:</strong> Legacy = "PortsApps Version 11" &mdash; <code>DP</code> = Data Port (&rarr; SD / Sensor Data tables),
        <code>LP</code> = Live Port (&rarr; LV / Live tables); the number is the TCP port. New = "ProtechBMS25" (2025 rewrite), <code>BmsSmart.*</code> namespace.</div>
    </div>

    <div class="section">
        <h2><span class="num">3</span>The Components</h2>
        <div class="grid cols-2">
            <div class="card border-new">
                <span class="tag t-new">New &middot; Production Core</span>
                <h3>BmsSmart-DataGateway</h3>
                <p>The heart of the system (~1&nbsp;MB, .NET 8 Windows Service). Replaces all DP/LP apps by listening on <strong>ports 31001&ndash;31009</strong> at once. Extremely active &mdash; Serilog files reach 200&nbsp;MB&ndash;1&nbsp;GB/day.</p>
                <ul>
                    <li><strong>TcpGatewayService</strong> &mdash; accept, ACK device, enqueue packet</li>
                    <li><strong>PacketQueue</strong> &mdash; bounded queue with back-pressure</li>
                    <li><strong>SensorDataHandler</strong> &mdash; decode <code>00D</code>, SqlBulkCopy &rarr; staging</li>
                    <li><strong>StagingFlushService</strong> &mdash; bulk copy &le;50k rows &rarr; final tables</li>
                    <li><strong>DashboardService</strong> &mdash; embedded "Gateway Cockpit" UI</li>
                    <li><strong>AI/anomaly</strong> &mdash; z-score, error-rate, EWMA, episodes</li>
                </ul>
            </div>
            <div class="card border-ctrl">
                <span class="tag t-ctrl">New &middot; HVAC Control</span>
                <h3>BmsSmart-CtrlGateway</h3>
                <p>Smaller (94&nbsp;KB, .NET 8 Windows Service), low-traffic. <strong>Deliberately independent</strong> from the DataGateway so HVAC control survives a data-pipeline restart. Ports <strong>16002 / 16005</strong>.</p>
                <ul>
                    <li><strong>SwitchControlService</strong> &mdash; drive HVAC relays on a schedule; auto-restart listener after socket error</li>
                    <li><strong>CtrlStatusService</strong> &mdash; <code>http://localhost:5101/api/status</code></li>
                    <li><strong>CtrlHealthWriterService</strong> &mdash; monitor table every 30s</li>
                    <li><strong>SwitchHealthTracker</strong> &mdash; per-switch health &amp; ordering</li>
                </ul>
            </div>
            <div class="card border-shared">
                <span class="tag t-shared">New &middot; Library</span>
                <h3>BmsSmart.Shared</h3>
                <p>Shared by both gateways (and BuildSmart.Api). Key piece: <strong>SelfEncryptingConfig</strong> &mdash; on first run encrypts <code>appsettings.json</code> &rarr; <code>appsettings.enc</code> via Windows DPAPI and deletes the plaintext. Also handles timezone normalization.</p>
            </div>
            <div class="card border-legacy">
                <span class="tag t-legacy">Legacy &middot; Per-Port</span>
                <h3>DP / LP Port Processors</h3>
                <p>Same compiled program, different config &mdash; one console app owns one TCP port. Flow: accept TCP &rarr; checksum (<code>CheckSum.dll</code>) &rarr; parse (<code>SharedLib.HeaderObj</code>) &rarr; resolve site (24h cache) &rarr; <code>EXEC</code> stored proc &rarr; throttled gateway-status update.</p>
                <ul>
                    <li>DP-31002 &rarr; SD table</li>
                    <li>DP-31009 &rarr; SD table <span class="sev med">config bug: points at 31002 SP</span></li>
                    <li>LP-30009 &rarr; LV table</li>
                </ul>
            </div>
        </div>
    </div>

    <div class="section">
        <h2><span class="num">4</span>The Data Protocol (Packet Format)</h2>
        <p class="lede">Devices send positional, fixed-width ASCII frames delimited by <code>$</code> &hellip; <code>*</code> (no separators). The first <strong>56 bytes are a fixed-width header</strong>; data blocks follow, then a <strong>5-digit checksum</strong> and the <code>*</code> terminator. <code>Customer_utilities.csv</code> (81,972 rows) defines how to slice and decode every field. <em>See the <strong>IoT Payload Visualizer</strong> tab for an interactive byte-by-byte decode.</em></p>
        <div class="packet">
            <span class="seg s6">$</span><span class="seg s1">006</span> <span class="seg s2">182</span> <span class="seg s4">00D</span> <span class="seg s3">McDonalds1</span> <span class="seg s5">2017000023</span> <span class="seg s2">0002</span> <span class="seg s2">0001</span> <span class="seg s6">05/03/2026</span><span class="seg s6">10:59:16</span> <span class="seg s3">468F1C85&hellip;4377409A</span> <span class="seg s2">09645</span><span class="seg s6">*</span>
        </div>
        <div style="height:16px"></div>
        <table>
            <tr><th>Field</th><th>Bytes</th><th>Example</th><th>Meaning</th></tr>
            <tr><td>SOF</td><td>1</td><td><code>$</code></td><td>Start-of-frame delimiter</td></tr>
            <tr><td>Version</td><td>3</td><td><code>006</code></td><td>Protocol version (&ldquo;006&rdquo; = v6)</td></tr>
            <tr><td>No. of Bytes</td><td>3</td><td><code>182</code></td><td>Total string length in bytes (varies by meter type)</td></tr>
            <tr><td>Port Code</td><td>3</td><td><code>00D</code></td><td>Routing &mdash; <code>00D</code> &rarr; Data Port &rarr; <strong>SD</strong> (Stored Data) &middot; <code>00T</code> &rarr; Data Port &rarr; <strong>LD</strong> (Live Data) &middot; <code>00Q</code> &rarr; Control Port</td></tr>
            <tr><td>Customer ID</td><td>10</td><td><code>McDonalds1</code></td><td>Fixed-width site / customer identifier (resolved via master table)</td></tr>
            <tr><td>Station ID</td><td>10</td><td><code>2017000023</code></td><td>Unique gateway / communication device ID</td></tr>
            <tr><td>Meter Type</td><td>4</td><td><code>0002</code></td><td>Equipment category &mdash; <code>0002</code> Electricity, <code>0003</code> Temperature, <code>0005</code> LPG, <code>0011</code> Running Hours, <code>0030</code> Load Meter</td></tr>
            <tr><td>Meter Serial</td><td>4</td><td><code>0001</code></td><td>Logical meter index at the site (sequential per type)</td></tr>
            <tr><td>Date</td><td>10</td><td><code>05/03/2026</code></td><td>Transaction date &mdash; <code>DD/MM/YYYY</code></td></tr>
            <tr><td>Time</td><td>8</td><td><code>10:59:16</code></td><td>Transaction time &mdash; <code>HH:MM:SS</code> (immediately follows date, no space)</td></tr>
            <tr><td colspan="4" style="background:#f1f5f9; font-weight:700; color:#475569;">Header total: 1 + 3 + 3 + 3 + 10 + 10 + 4 + 4 + 10 + 8 = <strong>56 bytes</strong></td></tr>
            <tr><td>Data Blocks</td><td>variable</td><td><code>468F1C85&hellip;</code></td><td>Readings &mdash; IEEE-754 Float32 (8 hex = 4 bytes) for Electricity; 10-digit decimal for Load Meters; ASCII signed decimal for Temperature &amp; LPG</td></tr>
            <tr><td>Checksum</td><td>5</td><td><code>09645</code></td><td>Validation value &mdash; last field before the EOF delimiter</td></tr>
            <tr><td>EOF</td><td>1</td><td><code>*</code></td><td>End-of-frame delimiter</td></tr>
        </table>
        <div class="callout"><strong>Decode rule:</strong> each catalog row gives a <code>Byteposition</code>, <code>TotalBytes</code>, <code>DataType</code>
        (<code>HEX</code> = IEEE-754 big-endian float / <code>ASC</code> = ASCII number / <code>TXT</code> = text) and a <code>Multiplier</code>,
        so <code>value = decode(frame[pos : pos+len]) &times; Multiplier</code>.</div>
    </div>

    <div class="section">
        <h2><span class="num">5</span>End-to-End Data Flow</h2>
        <p class="lede">From a sensor in a store, through the gateway tier, into SQL Server &mdash; the source that ProTech's Databricks Medallion pipeline ingests downstream.</p>
        <div class="flow">
            <div class="flow-row">
                <div class="flow-box edge">
                    <div class="lbl">Edge</div><strong>Field Devices</strong>
                    <small>Meters, temp probes, pH/Lambda sensors per store &mdash; emit <code>$&hellip;*</code> over raw TCP</small>
                </div>
            </div>
            <div class="flow-arrow">&darr;</div>
            <div class="flow-row">
                <div class="flow-box legacy">
                    <div class="lbl">Legacy (per port)</div><strong>DP / LP Apps</strong>
                    <small>31002 / 31009 / 30009 &middot; checksum &rarr; parse &rarr; site cache &rarr; <code>EXEC</code> stored proc</small>
                </div>
                <div class="flow-box gw">
                    <div class="lbl">New &middot; Data</div><strong>BmsSmart-DataGateway</strong>
                    <small>31001&ndash;31009 &middot; ACK + queue &rarr; PacketProcessor &rarr; SqlBulkCopy &rarr; staging</small>
                </div>
                <div class="flow-box ctrl">
                    <div class="lbl">New &middot; Control</div><strong>BmsSmart-CtrlGateway</strong>
                    <small>16002 / 16005 &middot; drive HVAC switches &middot; <code>/api/status</code> :5101</small>
                </div>
            </div>
            <div class="flow-arrow">&darr;</div>
            <div class="flow-row">
                <div class="flow-box gw">
                    <div class="lbl">Drain</div><strong>StagingFlushService</strong>
                    <small>Bulk copy &le;50,000 rows/batch from staging &rarr; FINAL tables</small>
                </div>
            </div>
            <div class="flow-arrow">&darr;</div>
            <div class="flow-row">
                <div class="flow-box db">
                    <div class="lbl">Source DB</div><strong>SQL Server &mdash; Mcdonalds1_AD</strong>
                    <small>SD / LV tables, gateway status &amp; monitor tables &mdash; the upstream source for the Databricks Bronze landing layer</small>
                </div>
            </div>
        </div>
        <div class="callout"><strong>Why staging + bulk copy:</strong> packet rate is very high (logs hit GB/day). Writing to staging and bulk-copying 50k-row batches into final tables scales far better than legacy per-row stored-procedure inserts.</div>
    </div>

    <div class="section">
        <h2><span class="num">6</span>Port Map</h2>
        <table>
            <tr><th>Port(s)</th><th>Owner</th><th>Purpose</th></tr>
            <tr><td><code>30009</code></td><td>LP-30009 (legacy)</td><td>Live data &rarr; LV table</td></tr>
            <tr><td><code>31002</code></td><td>DP-31002 (legacy)</td><td>Sensor data &rarr; SD table</td></tr>
            <tr><td><code>31009</code></td><td>DP-31009 (legacy)</td><td>Sensor data &rarr; SD table</td></tr>
            <tr><td><code>31001&ndash;31009</code></td><td>BmsSmart-DataGateway</td><td>All sensor data (replaces DP/LP)</td></tr>
            <tr><td><code>16002, 16005</code></td><td>BmsSmart-CtrlGateway</td><td>HVAC switch control (Primary / Secondary)</td></tr>
            <tr><td><code>5101</code> (HTTP)</td><td>BmsSmart-CtrlGateway</td><td><code>/api/status</code></td></tr>
        </table>
    </div>

    <div class="section">
        <h2><span class="num">7</span>Observations, Risks &amp; Recommendations</h2>
        <table>
            <tr><th>Severity</th><th>Finding</th><th>Recommendation</th></tr>
            <tr><td><span class="sev high">High</span></td><td>Plaintext SQL credentials in legacy <code>DP-*/LP-*.dll.config</code></td><td>Migrate to encrypted-config approach or decommission; rotate the exposed password</td></tr>
            <tr><td><span class="sev med">Medium</span></td><td>DP-31009's <code>PortSPName</code> points at the 31002 stored proc</td><td>Verify intended SP; fix the config</td></tr>
            <tr><td><span class="sev med">Medium</span></td><td>Log volume &mdash; DataGateway writes up to ~1&nbsp;GB/day with no visible rotation cap</td><td>Add Serilog rolling/retention; reduce per-packet logging</td></tr>
            <tr><td><span class="sev low">Low</span></td><td>Both generations deployed simultaneously &mdash; port-binding conflict risk</td><td>Confirm which services run; retire legacy once validated</td></tr>
            <tr><td><span class="sev low">Low</span></td><td>Debug symbols (<code>.pdb</code>) shipped to production &mdash; eases reverse engineering</td><td>Publish Release builds without PDBs</td></tr>
            <tr><td><span class="sev info">Info</span></td><td><code>BmsSmart-DataGateway.zip</code> (~22&nbsp;MB) at PortApps root</td><td>Keep as rollback artifact or move to build archive</td></tr>
        </table>
    </div>

    <div class="section">
        <h2><span class="num">8</span>Interactive Gateway Flows</h2>
        <p class="lede">Toggle between the two production services and <strong>click (or hover) any stage</strong> to inspect what it does, its key methods, and real log evidence. Arrows show the direction of data through the pipeline.</p>
        <div class="flow-toggle">
            <button class="ftoggle active" data-flow="data">&#9889; Data Gateway</button>
            <button class="ftoggle" data-flow="ctrl">&#10052; Control Gateway</button>
        </div>
        <div class="xflow" id="gw-flow">
            <svg class="xsvg" id="gw-svg"></svg>
            <div class="xcols" id="gw-cols"></div>
        </div>
        <div class="xdetail" id="gw-detail"></div>
    </div>

    <div class="footer-note">
        Generated from static analysis of compiled assemblies (metadata + string extraction), config files, dependency manifests and runtime logs in <code>data/PortApps/</code>.
        No source code was available; behavioral details were inferred from .NET metadata, embedded literals and Serilog output.
        Full reference: <code>gateway/PortApps-Analysis.md</code>.
    </div>

</div>

<script>
function buildFlow(cfg){
    var wrap = cfg.wrap, svg = cfg.svg, colsHost = cfg.cols, detail = cfg.detail, nodes = cfg.nodes;
    var html = '';
    for (var ci=0; ci<cfg.columns.length; ci++){
        var col = cfg.columns[ci];
        html += '<div class="xcol">';
        if (col.head){ html += '<div class="xcol-head">' + col.head + '</div>'; }
        for (var ni=0; ni<col.nodes.length; ni++){
            var id = col.nodes[ni]; var n = nodes[id];
            html += '<div class="xnode ' + n.cls + '" data-id="' + id + '">' +
                    '<span class="xn-ic">' + n.icon + '</span>' +
                    '<div class="xn-t">' + n.label + '<small>' + n.sub + '</small></div></div>';
        }
        html += '</div>';
    }
    colsHost.innerHTML = html;

    function center(el, side){
        var r = el.getBoundingClientRect(); var w = wrap.getBoundingClientRect();
        return { x: (side === 'r') ? (r.right - w.left) : (r.left - w.left), y: r.top - w.top + r.height/2 };
    }
    function draw(){
        var w = wrap.getBoundingClientRect();
        var cw = Math.max(w.width, colsHost.scrollWidth);
        svg.setAttribute('width', cw); svg.setAttribute('height', w.height);
        var s = '';
        for (var i=0; i<cfg.edges.length; i++){
            var e = cfg.edges[i];
            var a = colsHost.querySelector('[data-id="' + e[0] + '"]');
            var b = colsHost.querySelector('[data-id="' + e[1] + '"]');
            if (!a || !b){ continue; }
            var p1 = center(a, 'r'); var p2 = center(b, 'l');
            var mx = (p1.x + p2.x) / 2;
            var d = 'M ' + p1.x + ' ' + p1.y + ' C ' + mx + ' ' + p1.y + ' ' + mx + ' ' + p2.y + ' ' + (p2.x - 7) + ' ' + p2.y;
            var ah = (p2.x-7) + ',' + (p2.y-5) + ' ' + p2.x + ',' + p2.y + ' ' + (p2.x-7) + ',' + (p2.y+5);
            s += '<path class="xline" data-f="' + e[0] + '" data-t="' + e[1] + '" d="' + d + '"></path>';
            s += '<polygon class="xarr" data-f="' + e[0] + '" data-t="' + e[1] + '" points="' + ah + '"></polygon>';
        }
        svg.innerHTML = s;
    }

    function showDetail(id){
        var n = nodes[id];

    <div class="section">
        <h2><span class="num">7</span>Reliability &amp; Delivery Semantics</h2>
        <div class="grid cols-3">
            <div class="card"><h3>At-least-once</h3><p>Event Hubs is treated as a replayable log; no exactly-once at the producer.</p></div>
            <div class="card"><h3>Idempotent dedup</h3><p><code>msg_key = sha1(raw)</code> lets Delta <code>MERGE</code> / Postgres <code>ON CONFLICT</code> dedup retransmits &amp; retries.</p></div>
            <div class="card"><h3>Silent-failure contract</h3><p>Oversize / checksum / publish failures return <strong>no ACK</strong> → meter retransmits (legacy behaviour, preserved).</p></div>
            <div class="card"><h3>Graceful shutdown</h3><p>SIGTERM → stop accepting → drain handlers → flush producers → exit (~30&nbsp;s on Container Apps).</p></div>
            <div class="card"><h3>Outage tolerance</h3><p>~1M-message in-producer buffer (≈13 min at 1,250 msg/s) rides out brief EH degradation.</p></div>
            <div class="card"><h3>Stateless scale-out</h3><p>No local persistence; all state in Event Hubs. Multiple replicas behind the same ports.</p></div>
        </div>
    </div>

            <tr><td><span class="sev good">Good</span></td><td>Solid security posture: non-root container, secrets via Key Vault/<code>secretref</code> (never in image or git), per-topic SAS (least privilege), per-IP cap on top of NSG.</td></tr>
            <tr><td><span class="sev good">Good</span></td><td>Genuinely customer-agnostic: every tenant value is config; 62 hermetic tests cover the tricky parsing/prefix/SAS edge cases.</td></tr>

<script>
function buildFlow(cfg){
    var wrap = cfg.wrap, svg = cfg.svg, colsHost = cfg.cols, detail = cfg.detail, nodes = cfg.nodes;
    var html = '';
    for (var ci=0; ci<cfg.columns.length; ci++){
        var col = cfg.columns[ci];
        html += '<div class="xcol">';
        if (col.head){ html += '<div class="xcol-head">' + col.head + '</div>'; }
        for (var ni=0; ni<col.nodes.length; ni++){
            var id = col.nodes[ni]; var n = nodes[id];
            html += '<div class="xnode ' + n.cls + '" data-id="' + id + '">' +
                    '<span class="xn-ic">' + n.icon + '</span>' +
                    '<div class="xn-t">' + n.label + '<small>' + n.sub + '</small></div></div>';
        }
        html += '</div>';
    }
    colsHost.innerHTML = html;

    function center(el, side){
        var r = el.getBoundingClientRect(); var w = wrap.getBoundingClientRect();
        return { x: (side === 'r') ? (r.right - w.left) : (r.left - w.left), y: r.top - w.top + r.height/2 };
    }
    function draw(){
        var w = wrap.getBoundingClientRect();
        var cw = Math.max(w.width, colsHost.scrollWidth);
        svg.setAttribute('width', cw); svg.setAttribute('height', w.height);
        var s = '';
        for (var i=0; i<cfg.edges.length; i++){
            var e = cfg.edges[i];
            var a = colsHost.querySelector('[data-id="' + e[0] + '"]');
            var b = colsHost.querySelector('[data-id="' + e[1] + '"]');
            if (!a || !b){ continue; }
            var p1 = center(a, 'r'); var p2 = center(b, 'l');
            var mx = (p1.x + p2.x) / 2;
            var d = 'M ' + p1.x + ' ' + p1.y + ' C ' + mx + ' ' + p1.y + ' ' + mx + ' ' + p2.y + ' ' + (p2.x - 7) + ' ' + p2.y;
            var ah = (p2.x-7) + ',' + (p2.y-5) + ' ' + p2.x + ',' + p2.y + ' ' + (p2.x-7) + ',' + (p2.y+5);
            s += '<path class="xline" data-f="' + e[0] + '" data-t="' + e[1] + '" d="' + d + '"></path>';
            s += '<polygon class="xarr" data-f="' + e[0] + '" data-t="' + e[1] + '" points="' + ah + '"></polygon>';
        }
        svg.innerHTML = s;
    }

    function showDetail(id){
        var n = nodes[id];
        var h = '<h4>' + n.icon + ' ' + n.label + '</h4><p>' + n.desc + '</p>';
        if (n.ev){ h += '<div class="xd-ev">' + n.ev + '</div>'; }
        detail.innerHTML = h;
    }
    function setIntro(){ detail.innerHTML = '<p class="xhint">' + cfg.intro + '</p>'; }
    setIntro();

    function isConn(a, b){
        for (var k=0; k<cfg.edges.length; k++){
            if ((cfg.edges[k][0]===a && cfg.edges[k][1]===b) || (cfg.edges[k][1]===a && cfg.edges[k][0]===b)){ return true; }
        }
        return false;
    }
    function highlight(id){
        svg.classList.add('dim');
        var ls = svg.querySelectorAll('.xline, .xarr');
        for (var i=0; i<ls.length; i++){
            if (ls[i].getAttribute('data-f')===id || ls[i].getAttribute('data-t')===id){ ls[i].classList.add('on'); }
        }
        var ns = colsHost.querySelectorAll('.xnode');
        for (var j=0; j<ns.length; j++){
            var nid = ns[j].getAttribute('data-id');
            if (nid===id){ ns[j].classList.add('src'); }
            else if (isConn(id, nid)){ ns[j].classList.add('tgt'); }
        }
        showDetail(id);
    }
    function clearHi(){
        svg.classList.remove('dim');
        var on = svg.querySelectorAll('.on'); for (var i=0; i<on.length; i++){ on[i].classList.remove('on'); }
        var ns = colsHost.querySelectorAll('.xnode'); for (var j=0; j<ns.length; j++){ ns[j].classList.remove('src'); ns[j].classList.remove('tgt'); }
    }

    var ns = colsHost.querySelectorAll('.xnode');
    for (var i=0; i<ns.length; i++){
        (function(el){
            var id = el.getAttribute('data-id');
            el.addEventListener('mouseenter', function(){ highlight(id); });
            el.addEventListener('mouseleave', function(){ clearHi(); setIntro(); });
            el.addEventListener('click', function(){ highlight(id); });
        })(ns[i]);
    }

    draw();
    setTimeout(draw, 60);
    if (window.ResizeObserver){ var ro = new ResizeObserver(function(){ draw(); }); ro.observe(wrap); }
    window.addEventListener('resize', draw);
    return { draw: draw };
}

(function(){
    var NODES = {
        't-meter': { cls:'c-net', icon:'&#128223;', label:'Plant Meter', sub:'opens TCP',
            desc:'A field meter opens a TCP connection to a plant port (e.g. 30009) and streams a legacy $…* frame. Same hardware/protocol as the PortApps era.', ev:'' },
        't-conn': { cls:'c-gw', icon:'&#128268;', label:'handle_connection()', sub:'per-IP limiter',
            desc:'Per-connection coroutine. PerIPConcurrencyLimiter.try_acquire(ip) rejects once an IP exceeds MAX_CONNECTIONS_PER_IP (defence-in-depth on top of the NSG); bumps the tcp_active_connections gauge.', ev:'tcp_connection_rejected_total — per-IP cap exceeded' },
        't-read': { cls:'c-gw', icon:'&#128229;', label:"readuntil('*')", sub:'READ_TIMEOUT',
            desc:'Reads up to the * terminator with a read timeout. Carefully handles TimeoutError, IncompleteReadError, LimitOverrunError (no terminator within the 64 KB buffer) and peer resets — each with its own counter.', ev:'tcp_read_timeout_total · tcp_incomplete_read_total · tcp_oversized_read_total' },
        't-proc': { cls:'c-queue', icon:'&#129518;', label:'_process_one_packet()', sub:'size + checksum',
            desc:'Size guard (MAX_PACKET_BYTES) then a 5-digit checksum validation (a port of CheckSum.dll). All failure paths are SILENT — counted and logged, but no bytes are returned — so the meter retransmits.', ev:"tcp_nack_size_total · tcp_nack_checksum_total (no NACK is actually sent)" },
        't-pub': { cls:'c-eh', icon:'&#128228;', label:'publisher.publish()', sub:'sha1 key · acks=all',
            desc:'Builds key=sha1(raw) and headers (source_ip, customer_id, ingest_ts, schema_version=1), produces to Event Hubs over the Kafka surface (acks=all), and awaits delivery within EH_PUBLISH_TIMEOUT_SECONDS. One producer + one poll thread per topic.', ev:'eh_publish_total · eh_publish_failure_total · eh_publish_timeout_total' },
        't-eh': { cls:'c-net', icon:'&#9729;', label:'Event Hubs topic', sub:'eh-mcd-raw-lv',
            desc:'A Kafka-compatible topic per customer/stream. Treated as an at-least-once replayable log; downstream consumers dedup on sha1(raw). Tuned for the EH Kafka surface (≤ v0.10 protocol, no compression, idempotence off).', ev:'' },
        't-dbx': { cls:'c-db', icon:'&#128311;', label:'Databricks', sub:'decode → Delta + Lakebase',
            desc:'Consumes the raw frames, decodes them against the CustomerUtilities catalog (Byteposition / TotalBytes / DataType / Multiplier), and lands rows in Delta tables + Lakebase (Postgres). This is where all "meaning" now lives.', ev:'' }
    };
    buildFlow({
        wrap: document.getElementById('tcp-flow'),
        svg: document.getElementById('tcp-svg'),
        cols: document.getElementById('tcp-cols'),
        detail: document.getElementById('tcp-detail'),
        intro: 'Hover or click any stage. Meter &rarr; checksum &rarr; publish raw to Event Hubs &rarr; Databricks. Failures are silent so the meter retransmits.',
        nodes: NODES,
        columns: [
            { head:'Plant', nodes:['t-meter'] },
            { head:'Accept', nodes:['t-conn'] },
            { head:'Read', nodes:['t-read'] },
            { head:'Validate', nodes:['t-proc'] },
            { head:'Publish', nodes:['t-pub'] },
            { head:'Stream', nodes:['t-eh'] },
            { head:'Downstream', nodes:['t-dbx'] }
        ],
        edges: [ ['t-meter','t-conn'], ['t-conn','t-read'], ['t-read','t-proc'], ['t-proc','t-pub'], ['t-pub','t-eh'], ['t-eh','t-dbx'] ]
    });
})();
<\/script>
</body>
</html>
`;
