<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProTech Architecture Presentation</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .navbar {
            background-color: #ffffff;
            padding: 15px 30px;
            display: flex;
            gap: 20px;
            align-items: center;
            border-bottom: 2px solid #e2e8f0;
            box-shadow: 0 4px 10px rgba(15, 23, 42, 0.05);
            z-index: 100;
        }
        .navbar h2 {
            margin: 0;
            margin-right: auto;
            color: #0ea5e9;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 1.2rem;
        }
        .tab {
            background-color: #f1f5f9;
            color: #475569;
            border: 1px solid #e2e8f0;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 700;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .tab:hover {
            background-color: #e2e8f0;
            color: #0f172a;
            transform: translateY(-2px);
        }
        .tab.active {
            background-color: #0ea5e9;
            color: white;
            border-color: #0ea5e9;
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.3);
        }
        .iframe-container {
            flex: 1;
            position: relative;
            background: #f8fafc;
        }
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: none;
            transition: opacity 0.5s ease;
            opacity: 0;
        }
        iframe.active {
            display: block;
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h2>ProTech Data Ecosystem</h2>
        <button class="tab active" onclick="switchTab('source', this)">
            Source Architecture
        </button>
        <button class="tab" onclick="switchTab('payload', this)">
            IoT Payload Visualizer
        </button>
        <button class="tab" onclick="switchTab('gateway', this)">
            Gateway / PortApps
        </button>
        <button class="tab" onclick="switchTab('tcp', this)">
            Cloud TCP Listener
        </button>
        <button class="tab" onclick="switchTab('databricks', this)">
            Databricks Medallion
        </button>
        <button class="tab" onclick="switchTab('dictionary', this)">
            Meter-Utility Dictionary
        </button>
    </div>

    <div class="iframe-container">
        <!-- Using local paths to load the existing HTML files securely -->
        <iframe id="frame-source" src="Protech_Source_Architecture.html" class="active"></iframe>
        <iframe id="frame-payload" src="source/IoT_Payload_Visualizer.html"></iframe>
        <iframe id="frame-gateway" src="Protech_Gateway_Architecture.html"></iframe>
        <iframe id="frame-tcp" src="Protech_TCPListener_Architecture.html"></iframe>
        <iframe id="frame-databricks" src="Protech_Databricks_Architecture.html"></iframe>
        <iframe id="frame-dictionary" src="Protech_Meter_Utility_Master.html"></iframe>
    </div>

    <script>
        function switchTab(tabId, btn) {
            // Remove active classes from all buttons and frames
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('iframe').forEach(f => {
                f.classList.remove('active');
                f.style.display = 'none'; // Ensure display none for hidden frames
            });
            
            // Add active class to clicked button and target frame
            btn.classList.add('active');
            const targetFrame = document.getElementById('frame-' + tabId);
            targetFrame.style.display = 'block';
            
            // Slight delay for smooth opacity transition
            setTimeout(() => {
                targetFrame.classList.add('active');
            }, 10);
        }
    </script>
</body>
</html>
